<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <title>Git Buoy social preview</title>
  <defs>
    <clipPath id="terminal-window">
      <rect x="516" y="78" width="704" height="484" rx="8"/>
    </clipPath>
    <filter id="terminal-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#05080d" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="#0b111b"/>
  <path d="M0 106 C80 82 160 130 240 106 S400 82 480 106" fill="none" stroke="#274b68" stroke-width="2" opacity="0.6"/>
  <path d="M0 122 C80 98 160 146 240 122 S400 98 480 122" fill="none" stroke="#274b68" stroke-width="2" opacity="0.3"/>
  <path d="M0 582 C80 558 160 606 240 582 S400 558 480 582" fill="none" stroke="#274b68" stroke-width="2" opacity="0.35"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'DejaVu Sans Mono', monospace">
    <text x="64" y="78" fill="#65a8d6" font-size="24" font-weight="700">≋ LIVE REPOSITORY STATE</text>
    <text x="60" y="230" fill="#f0f2f5" font-size="88" font-weight="800" letter-spacing="-5">GIT</text>
    <text x="60" y="314" fill="#f0f2f5" font-size="88" font-weight="800" letter-spacing="-5">BUOY</text>
    <text x="64" y="374" fill="#aeb5c0" font-size="25">A terminal harbor for</text>
    <text x="64" y="410" fill="#aeb5c0" font-size="25">parallel software work.</text>

    <g font-size="16" font-weight="700">
      <rect x="64" y="464" width="124" height="34" rx="17" fill="#162536" stroke="#315675"/>
      <text x="126" y="486" fill="#79b7df" text-anchor="middle">LOCAL-FIRST</text>
      <rect x="200" y="464" width="68" height="34" rx="17" fill="#162536" stroke="#315675"/>
      <text x="234" y="486" fill="#79b7df" text-anchor="middle">RUST</text>
      <rect x="280" y="464" width="104" height="34" rx="17" fill="#162536" stroke="#315675"/>
      <text x="332" y="486" fill="#79b7df" text-anchor="middle">RATATUI</text>
    </g>
  </g>

  <g filter="url(#terminal-shadow)">
    <rect x="498" y="60" width="740" height="520" rx="18" fill="#111a27" stroke="#314154" stroke-width="2"/>
    <circle cx="526" cy="82" r="5" fill="#e97474"/>
    <circle cx="544" cy="82" r="5" fill="#e5c064"/>
    <circle cx="562" cy="82" r="5" fill="#7ec091"/>
    <rect x="516" y="96" width="704" height="466" rx="8" fill="#0f1622"/>
    <image href="demo.svg" x="516" y="96" width="704" height="435" preserveAspectRatio="xMidYMin meet" clip-path="url(#terminal-window)"/>
  </g>
</svg>
